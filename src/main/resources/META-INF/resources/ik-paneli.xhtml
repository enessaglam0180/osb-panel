<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/WEB-INF/template.xhtml">
    <ui:define name="pageTitle">İK Yönetim Paneli</ui:define>

    <ui:define name="content">
        <h:form id="hrForm" enctype="multipart/form-data">

            <p:growl id="messages" showDetail="false" life="4000" />

            <div class="page-header">
                <div>
                    <h1 class="page-title">İK Yönetim Paneli — Operatör</h1>
                    <p class="page-subtitle">Tüm başvuruları, adayları ve süreçleri tam yetkiyle yönetin.</p>
                </div>
            </div>

            <!-- KPI Kartları - Dinamik güncellenmesi için id eklendi ve panel içine alındı -->
            <p:outputPanel id="kpiPanel">
                <div class="kpi-grid">
                    <p:card styleClass="kpi-card">
                        <div class="kpi-body">
                            <div class="kpi-icon kpi-icon--blue">
                                <i class="pi pi-users" />
                            </div>
                            <div>
                                <div class="kpi-value">
                                    <h:outputText value="#{basvuruBean.toplamAdaySayisi}" />
                                </div>
                                <div class="kpi-label">Toplam Aday</div>
                            </div>
                        </div>
                    </p:card>

                    <p:card styleClass="kpi-card">
                        <div class="kpi-body">
                            <div class="kpi-icon kpi-icon--amber">
                                <i class="pi pi-clock" />
                            </div>
                            <div>
                                <div class="kpi-value" style="color:#d97706;">
                                    <h:outputText value="#{basvuruBean.bekleyenSayisi}" />
                                </div>
                                <div class="kpi-label">Bekleyen</div>
                            </div>
                        </div>
                    </p:card>

                    <p:card styleClass="kpi-card">
                        <div class="kpi-body">
                            <div class="kpi-icon kpi-icon--green">
                                <i class="pi pi-check-circle" />
                            </div>
                            <div>
                                <div class="kpi-value" style="color:#16a34a;">
                                    <h:outputText value="#{basvuruBean.mulakatSayisi}" />
                                </div>
                                <div class="kpi-label">Mülakata Çağrılan</div>
                            </div>
                        </div>
                    </p:card>

                    <p:card styleClass="kpi-card">
                        <div class="kpi-body">
                            <div class="kpi-icon kpi-icon--gray">
                                <i class="pi pi-times-circle" />
                            </div>
                            <div>
                                <div class="kpi-value" style="color:#ef4444;">
                                    <h:outputText value="#{basvuruBean.redSayisi}" />
                                </div>
                                <div class="kpi-label">Reddedilen</div>
                            </div>
                        </div>
                    </p:card>
                </div>
            </p:outputPanel>

            <p:card>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                    <h2 style="margin:0; font-size: 1.25rem; font-weight:600; color:#334155;">Tüm Başvurular ve Aday Yönetimi</h2>
                </div>

                <p:dataTable id="basvuruTablosu" var="b" value="#{basvuruBean.tumBasvurular}"
                    emptyMessage="Henüz hiçbir kayıt bulunmamaktadır." paginator="true" rows="15"
                    rowHover="true" styleClass="p-datatable-sm" sortBy="#{b.basvuruTarihi}" sortOrder="descending">

                    <!-- Aday Bilgisi (Ad, Meslek) -->
                    <p:column headerText="Aday" sortBy="#{b.isArayan.adSoyad}"
                        filterBy="#{b.isArayan.adSoyad}" filterMatchMode="contains" style="min-width: 160px;">
                        <h:outputText value="#{b.isArayan.adSoyad}" style="font-weight: bold;" />
                        <br />
                        <h:outputText value="#{b.isArayan.meslek}" style="font-size: 0.85em; color: gray;" />
                    </p:column>

                    <!-- İletişim ve Şehir -->
                    <p:column headerText="İletişim / Şehir" filterBy="#{b.isArayan.sehir}" filterMatchMode="contains" style="width:160px;">
                        <h:outputText value="#{b.isArayan.eposta}" />
                        <br />
                        <h:outputText value="#{b.isArayan.telefon} - #{b.isArayan.sehir}" style="font-size:0.85em; color:gray;" />
                    </p:column>

                    <!-- Eğitim ve Deneyim -->
                    <p:column headerText="Eğitim / Deneyim" style="width:140px;">
                        <h:outputText value="#{b.isArayan.egitimDurumu}" />
                        <br />
                        <h:outputText value="#{b.isArayan.deneyimYili} Yıl Deneyim" style="font-size:0.85em; color:gray;" rendered="#{b.isArayan.deneyimYili != null}" />
                    </p:column>

                    <!-- Başvurulan İlan -->
                    <p:column headerText="Başvurulan İlan" sortBy="#{b.isIlani.baslik}"
                        filterBy="#{b.isIlani.baslik}" filterMatchMode="contains" style="width:180px;">
                        <h:panelGroup rendered="#{b.isIlani != null}">
                            <h:outputText value="#{b.isIlani.baslik}" />
                            <br />
                            <h:outputText value="#{b.isIlani.sanayici.companyName}" style="font-size: 0.85em; color: #007ad9;" />
                        </h:panelGroup>
                        <h:panelGroup rendered="#{b.isIlani == null}">
                            <p:tag value="Genel Havuz" severity="info" />
                        </h:panelGroup>
                        <div style="font-size:0.8rem; color:#94a3b8; margin-top:4px;">
                            <h:outputText value="#{b.basvuruTarihi}">
                                <f:convertDateTime type="localDateTime" pattern="dd.MM.yyyy HH:mm" />
                            </h:outputText>
                        </div>
                    </p:column>

                    <!-- Aday Notu / Durumu -->
                    <p:column headerText="Aday Notu (Akıbet)" style="width: 160px;">
                        <p:inputText value="#{b.isArayan.durum}" placeholder="Not veya durum..." style="width:100%;">
                            <p:ajax event="blur" listener="#{basvuruBean.adayGuncelle(b.isArayan)}"
                                update=":hrForm:messages" />
                        </p:inputText>
                    </p:column>

                    <!-- Başvuru Durumu (Aşama) -->
                    <p:column headerText="Aşama" style="width: 160px;">
                        <h:panelGroup id="durumGrup" style="display:block; margin-bottom: 5px;">
                            <p:tag value="#{b.basvuruDurumu}"
                                severity="#{b.basvuruDurumu == 'BEKLIYOR' ? 'warning' :
                                               b.basvuruDurumu == 'INCELENDI' ? 'info' :
                                               b.basvuruDurumu == 'MULAKATA_CAGRILDI' ? 'success' : 'danger'}" />
                        </h:panelGroup>

                        <p:selectOneMenu value="#{b.basvuruDurumu}" style="width: 100%;">
                            <p:ajax listener="#{basvuruBean.durumGuncelle(b)}"
                                update=":hrForm:messages :hrForm:kpiPanel durumGrup" />
                            <f:selectItem itemLabel="Bekliyor" itemValue="BEKLIYOR" />
                            <f:selectItem itemLabel="İncelendi" itemValue="INCELENDI" />
                            <f:selectItem itemLabel="Mülakata Çağrıldı" itemValue="MULAKATA_CAGRILDI" />
                            <f:selectItem itemLabel="Reddedildi" itemValue="REDDEDILDI" />
                        </p:selectOneMenu>
                    </p:column>

                    <!-- CV -->
                    <p:column headerText="CV" style="width: 50px; text-align: center;">
                        <p:commandButton icon="pi pi-file-pdf" title="CV İndir"
                            styleClass="ui-button-outlined ui-button-secondary rounded-button p-button-sm"
                            ajax="false" rendered="#{b.isArayan.cvDosyaYolu != null}">
                            <p:fileDownload value="#{basvuruBean.cvIndir(b)}" />
                        </p:commandButton>
                    </p:column>

                    <!-- İşlemler -->
                    <p:column headerText="İşlemler" style="width: 80px; text-align: center;">
                        <p:commandButton icon="pi pi-trash" title="Sadece Başvuruyu Sil"
                            styleClass="p-button-rounded p-button-text p-button-warning p-button-sm"
                            actionListener="#{basvuruBean.basvuruSil(b)}"
                            update=":hrForm:basvuruTablosu :hrForm:kpiPanel :hrForm:messages" process="@this">
                            <p:confirm header="Emin misiniz?"
                                message="Sadece bu başvuruyu silmek istediğinize emin misiniz? (Aday silinmez)"
                                icon="pi pi-exclamation-triangle" />
                        </p:commandButton>
                        
                        <p:commandButton icon="pi pi-user-minus" title="Adayı Komple Sil"
                            styleClass="p-button-rounded p-button-text p-button-danger p-button-sm"
                            actionListener="#{basvuruBean.adaySil(b.isArayan)}"
                            update=":hrForm:basvuruTablosu :hrForm:kpiPanel :hrForm:messages" process="@this">
                            <p:confirm header="Dikkat!"
                                message="'#{b.isArayan.adSoyad}' adayını ve yaptığı tüm başvuruları kalıcı olarak silmek istediğinize emin misiniz?"
                                icon="pi pi-exclamation-circle" />
                        </p:commandButton>
                    </p:column>

                </p:dataTable>
            </p:card>

            <!-- Global confirm dialog -->
            <p:confirmDialog global="true" showEffect="fade" style="width:380px;">
                <p:commandButton value="Sil" type="button" styleClass="ui-confirmdialog-yes p-button-danger p-button-sm"
                    icon="pi pi-check" />
                <p:commandButton value="İptal" type="button" styleClass="ui-confirmdialog-no p-button-text p-button-sm"
                    icon="pi pi-times" />
            </p:confirmDialog>

        </h:form>
    </ui:define>
</ui:composition>

</html>
